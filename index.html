<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 長岡花火之旅</title>
    <style>
        /* 基礎設定與長岡煙火背景 (使用 Unsplash 公開高畫質煙火圖) */
        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang TC', 'LiHei Pro', '微軟正黑體', Arial, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1498354178607-a79df2916198?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* 標題設計 */
        h1 {
            text-align: center;
            color: #ffffff;
            background-color: rgba(0, 0, 0, 0.65);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* 卡片設計與動畫 */
        .day-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border-left: 5px solid #3498db;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out forwards;
        }
        
        /* 設定不同卡片的動畫延遲，做出階梯式浮現效果 */
        .card-1 { animation-delay: 0.1s; border-left-color: #3498db; }
        .card-2 { animation-delay: 0.3s; border-left-color: #e67e22; }
        .card-3 { animation-delay: 0.5s; border-left-color: #9b59b6; }
        .card-4 { animation-delay: 0.7s; border-left-color: #2ecc71; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .day-title {
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 10px;
            font-size: 22px;
        }

        /* 時間軸與事件 */
        .event {
            display: flex;
            margin-top: 15px;
            align-items: flex-start;
        }
        .time {
            font-weight: bold;
            color: #e74c3c;
            width: 65px;
            flex-shrink: 0;
            font-size: 15px;
            padding-top: 2px;
        }
        .desc {
            flex-grow: 1;
            font-size: 16px;
        }

        /* 照片區塊設計 */
        .photo-box {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .photo-box:hover {
            transform: scale(1.02);
        }

        /* 底部 */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            font-weight: bold;
            color: #27ae60;
            background: rgba(234, 250, 241, 0.95);
            border-radius: 8px;
            animation: fadeInUp 0.8s ease-out 1s forwards;
            opacity: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>🎆 2026 長岡花火之旅手冊</h1>

    <div class="day-card card-1">
        <h2 class="day-title">Day 1：東京集合</h2>
        
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Tokyo_Station_Marunouchi_Building_20121014.jpg/800px-Tokyo_Station_Marunouchi_Building_20121014.jpg" alt="東京車站" class="photo-box">

        <div class="event">
            <div class="time">15:00</div>
            <div class="desc">大家集合在東京，東橫藏前二號店辦理入住</div>
        </div>
        <div class="event">
            <div class="time">18:00</div>
            <div class="desc">Peter Luger 牛排</div>
        </div>
        <div class="event">
            <div class="time">22:00</div>
            <div class="desc">居酒屋敘舊</div>
        </div>
    </div>

    <div class="day-card card-2">
        <h2 class="day-title">Day 2：前往新潟</h2>
        
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/JR_Niigata_Station_Bandai_Square.jpg/800px-JR_Niigata_Station_Bandai_Square.jpg" alt="新潟車站" class="photo-box">

        <div class="event">
            <div class="time">08:30</div>
            <div class="desc">飯店計程車集體出發東京站</div>
        </div>
        <div class="event">
            <div class="time">09:12</div>
            <div class="desc">上越新幹線前往新潟</div>
        </div>
        <div class="event">
            <div class="time">15:00</div>
            <div class="desc">東橫INN 新潟站前辦理 Check-in</div>
        </div>
        <div class="event">
            <div class="time">16:00</div>
            <div class="desc">自由行（公雞跟 Hima 前往長岡收看第一次的煙火）</div>
        </div>
        <div class="event">
            <div class="time">22:00</div>
            <div class="desc">公雞跟 Hima 回來，居酒屋大家行前會</div>
        </div>
    </div>

    <div class="day-card card-3">
        <h2 class="day-title">Day 3：長岡花火大會</h2>
